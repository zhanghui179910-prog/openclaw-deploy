services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./openclaw_workspace:/workspace
      - ./.env:/app/.env:ro
    environment:
      - WORKSPACE_PATH=/workspace
    # --- 下面这三行就是保活的关键，一定要有 ---
    tty: true
    stdin_open: true
    command: tail -f /dev/null
    # ------------------------------------------
    networks:
      - openclaw-network

networks:
  openclaw-network:
    driver: bridge
