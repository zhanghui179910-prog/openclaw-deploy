services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./openclaw_workspace:/workspace
      - ./.env:/app/.env:ro
    environment:
      - WORKSPACE_PATH=/workspace
    networks:
      - openclaw-network

networks:
  openclaw-network:
    driver: bridge
